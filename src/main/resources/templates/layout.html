<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' – Campus Clubs'">Campus Clubs</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">

        <a class="navbar-brand fw-bold" th:href="@{/clubs}">
            Campus Clubs
        </a>

        <div class="navbar-nav">

            <a class="nav-link"
               th:href="@{/clubs}">
                Clubs
            </a>

            <a class="nav-link"
               th:href="@{/events}">
                Events
            </a>

            <span id="navbar-username"
                  class="navbar-username text-white me-3"
                  sec:authorize="isAuthenticated()"
                  sec:authentication="name"></span>

            <form th:action="@{/logout}" method="post"
                  sec:authorize="isAuthenticated()">
                <button type="submit" class="btn btn-outline-light">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const button = document.getElementById("check-weather-js");
            const result = document.getElementById("weather-result");
            const locationInput = document.getElementById("location");

            button?.addEventListener("click", async () => {
                const location = locationInput.value.trim();

                if (!location) {
                    result.textContent = "Please enter a location first.";
                    return;
                }

                try {
                    const response = await fetch(
                        `/api/weather?location=${encodeURIComponent(location)}`,
                        {
                            headers: {
                                "Accept": "application/json"
                            }
                        }
                    );

                    const data = await response.json();
                    result.textContent = data.raining ? "Raining" : "Clear";
                } catch (e) {
                    result.textContent = "Weather data unavailable.";
                }
            });
        });
    </script>
</th:block>

</body>
</html>
