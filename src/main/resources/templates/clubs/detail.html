<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head('Club Details')"></head>

<body>

<nav th:replace="layout :: navbar"></nav>

<div class="container">

    <h1 th:text="${club.name}"></h1>

    <p>
        <strong>Category:</strong>
        <span th:text="${club.category}"></span>
    </p>

    <p th:text="${club.description}"></p>

    <h2>Upcoming Events</h2>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Location</th>
            <th>Type</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="event : ${club.events}">
            <td th:text="${event.name}"></td>
            <td th:text="${event.date}"></td>
            <td th:text="${event.location}"></td>
            <td th:text="${event.type}"></td>
            <td>
                <a class="btn btn-sm btn-warning"
                   th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${club.id}, eventId=${event.id})}">
                    Edit
                </a>

                <a class="btn btn-sm btn-danger"
                   th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${club.id}, eventId=${event.id})}">
                    Delete
                </a>
            </td>
        </tr>

        </tbody>

    </table>

    <div class="mt-3">
        <a class="btn btn-success"
           th:href="@{/clubs/{clubId}/events/create(clubId=${club.id})}">
            Add Event
        </a>
    </div>

</div>

<th:block th:replace="layout :: scripts"></th:block>

</body>
</html>
