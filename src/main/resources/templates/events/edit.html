<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head('Edit Event')"></head>

<body>

<nav th:replace="layout :: navbar"></nav>

<div class="container">

    <h1>Edit Event</h1>

    <form th:action="@{/clubs/{clubId}/events/{eventId}(clubId=${clubId}, eventId=${eventId})}"
          th:object="${event}"
          method="post">

        <input type="hidden" name="_method" value="put"/>

        <div class="mb-3">
            <label class="form-label">Name *</label>
            <input type="text" class="form-control"
                   th:field="*{name}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Date *</label>
            <input type="date" class="form-control"
                   th:field="*{date}">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('date')}"
                 th:errors="*{date}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Type *</label>
            <select class="form-select" th:field="*{type}">
                <option value="">-- Select type --</option>
                <option th:each="eventType : ${eventTypes}"
                        th:value="${eventType.id}"
                        th:text="${eventType.name}">
                </option>
            </select>
            <div class="text-danger"
                 th:if="${#fields.hasErrors('type')}"
                 th:errors="*{type}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text"
                   class="form-control"
                   id="location"
                   th:field="*{location}"
                   placeholder="Optional">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('location')}"
                 th:errors="*{location}">
            </div>

            <div class="d-flex gap-2 mt-2">
                <button type="button" id="check-weather-js" class="btn btn-outline-primary">
                    Check Weather JS
                </button>

                <button type="button"
                        class="btn btn-outline-secondary"
                        th:attr="hx-get=@{/api/weather},
                         hx-include='[name=location]',
                         hx-target='#weather-result',
                         hx-swap='innerHTML'">
                    Check Weather HTMX
                </button>
            </div>

            <div id="weather-result" class="mt-2 text-muted"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control"
                      th:field="*{description}"
                      rows="3"></textarea>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-warning">
                Save Changes
            </button>

            <a class="btn btn-secondary"
               th:href="@{/clubs/{clubId}/events/{eventId}(clubId=${clubId}, eventId=${eventId})}">
                Cancel
            </a>
        </div>

    </form>

</div>

<th:block th:replace="layout :: scripts"></th:block>

</body>
</html>
