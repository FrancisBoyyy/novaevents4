<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head(${event.name})"></head>

<body>

<nav th:replace="layout :: navbar"></nav>

<div class="container">

    <h1 th:text="${event.name}">Event Name</h1>

    <p>
        <strong>Club:</strong>
        <a th:href="@{/clubs/{id}(id=${event.clubId})}"
           th:text="${event.clubName}">
        </a>
    </p>

    <p>
        <strong>Date:</strong>
        <span th:text="${event.date}"></span>
    </p>

    <p>
        <strong>Location:</strong>
        <span th:text="${event.location}"></span>
    </p>

    <p>
        <strong>Type:</strong>
        <span th:text="${event.type}"></span>
    </p>

    <p>
        <strong>Description:</strong>
        <span th:text="${event.description}"></span>
    </p>

    <div class="mt-3">
        <a class="btn btn-warning"
           th:href="@{/clubs/{clubId}/events/{eventId}/edit(clubId=${event.clubId}, eventId=${event.id})}">
            Edit
        </a>

        <a class="btn btn-danger"
           th:href="@{/clubs/{clubId}/events/{eventId}/delete(clubId=${event.clubId}, eventId=${event.id})}">
            Delete
        </a>
    </div>

</div>

<th:block th:replace="layout :: scripts"></th:block>

</body>
</html>
